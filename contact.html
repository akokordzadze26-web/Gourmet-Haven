<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Haven | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Gourmet <span>Haven</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact-section">
        <h2 class="section-title">Contact Us</h2>
        <p class="contact-subtitle">Have a question or want to reserve a table? Drop us a message!</p>

        <div class="contact-container">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message here..." required></textarea>
                </div>
                <button type="submit" class="btn send-btn">Send Message</button>
            </form>

            <div class="contact-info">
                <div class="info-item">
                    <h4>📞 Phone</h4>
                    <p>+995 555 12 34 56</p>
                </div>
                <div class="info-item">
                    <h4>✉️ Email</h4>
                    <p>info@gourmethaven.com</p>
                </div>
                <div class="info-item">
                    <h4>📍 Address</h4>
                    <p>25 Ilia Chavchavadze Ave, Tbilisi, Georgia</p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Gourmet Haven. All rights reserved.</p>
    </footer>

</body>
</html>
